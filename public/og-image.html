<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    width:1200px;height:630px;overflow:hidden;
    background:#000000;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:'Courier New',Courier,monospace;
    position:relative;
  }
  img{width:140px;height:140px;object-fit:contain;filter:invert(1);margin-bottom:28px;}
  .title{font-size:20px;color:#ffffff;letter-spacing:0.5em;text-transform:uppercase;margin-bottom:10px;}
  .sub{font-size:10px;color:#444444;letter-spacing:0.4em;text-transform:uppercase;margin-bottom:36px;}
  .line{width:1px;height:36px;background:rgba(255,255,255,0.12);margin-bottom:36px;}
  .drop{font-size:10px;color:#2a2a2a;letter-spacing:0.35em;text-transform:uppercase;}
  .frame{position:absolute;top:24px;left:24px;right:24px;bottom:24px;border:1px solid rgba(255,255,255,0.05);}
</style>
</head>
<body>
  <div class="frame"></div>
  <img src="/og-logo.png" alt="TVP"/>
  <p class="title">True Vision Project</p>
  <p class="sub">Built from nothing</p>
  <div class="line"></div>
  <p class="drop">Drop 001 — Archive Access Open</p>
</body>
</html>
